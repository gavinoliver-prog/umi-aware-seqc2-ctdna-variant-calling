name: ctdna2
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Core language and JVM
  - python=3.10.20
  - openjdk=25.0.2

  # Alignment
  - bwa=0.7.19
  - samtools=1.23.1
  - htslib=1.23.1

  # Variant calling
  - bcftools=1.23.1
  - gatk4=4.6.2.0
  - picard=3.4.0
  - lofreq=2.1.5    # low-VAF caller; bioconda linux-64 has 2.1.5

  # Consensus / UMI calling
  # fgbio: bioconda only packages 1.4.0; we need 2.3.0 for ZipperBams and
  # current GroupReadsByUmi flags. 01_setup_env.sh downloads the release JAR
  # to ~/tools/fgbio/fgbio-2.3.0.jar and writes scripts/fgbio_env.sh.
  # Do NOT add fgbio here — it conflicts with gatk4 in the same conda env.

  # QC
  - fastqc=0.12.1
  - multiqc=1.33

  # Utilities
  - bedtools=2.31.1
  - seqtk=1.5
  - mosdepth=0.3.13
  - sra-tools=3.2.1
  - entrez-direct=24.0
